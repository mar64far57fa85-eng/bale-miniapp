<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داور هوشمند فوتبال</title>
    <script src="https://tapi.bale.ai/miniapp.js?3"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .menu-item {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .menu-item:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
        }
        .menu-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .menu-title {
            font-size: 14px;
            font-weight: bold;
        }
        .info-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .info-card h3 {
            margin-bottom: 10px;
            color: #feca57;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 30px;
        }
        @media (max-width: 500px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚽ داور هوشمند فوتبال</h1>
            <p>تاکتیک بده، مسابقه بده، با هوش مصنوعی قضاوت شو!</p>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="sendCommand('🎯 تاکتیک')">
                <div class="menu-icon">📝</div>
                <div class="menu-title">ارسال تاکتیک</div>
            </div>
            <div class="menu-item" onclick="sendCommand('🤝 درخواست بازی')">
                <div class="menu-icon">🎮</div>
                <div class="menu-title">درخواست بازی</div>
            </div>
            <div class="menu-item" onclick="sendCommand('📋 ترکیب من')">
                <div class="menu-icon">👕</div>
                <div class="menu-title">ترکیب من</div>
            </div>
            <div class="menu-item" onclick="sendCommand('🛒 فروشگاه')">
                <div class="menu-icon">🛍️</div>
                <div class="menu-title">فروشگاه</div>
            </div>
            <div class="menu-item" onclick="sendCommand('📊 لیگ و نتایج')">
                <div class="menu-icon">🏆</div>
                <div class="menu-title">جدول لیگ</div>
            </div>
            <div class="menu-item" onclick="sendCommand('💬 نظرات')">
                <div class="menu-icon">💬</div>
                <div class="menu-title">نظرات</div>
            </div>
            <div class="menu-item" onclick="sendCommand('/admin')">
                <div class="menu-icon">⚙️</div>
                <div class="menu-title">پنل مدیریت</div>
            </div>
        </div>

        <div class="info-card">
            <h3>🏆 آخرین نتایج</h3>
            <div id="results">در حال بارگیری...</div>
        </div>

        <div class="footer">
            <p>Mohammad</p>
        </div>
    </div>

    <script>
        // اتصال به بله
        let WebApp = window.Telegram?.WebApp || window.Bale?.WebApp;
        
        if (WebApp) {
            WebApp.ready();
            WebApp.expand();
            const user = WebApp.initDataUnsafe?.user;
            if (user) {
                console.log('کاربر:', user.first_name);
            }
        }

        // تابع ارسال فرمان به ربات
        function sendCommand(command) {
            if (WebApp) {
                WebApp.sendData(JSON.stringify({ type: 'command', data: command }));
                WebApp.close();
            } else {
                alert('لطفاً این صفحه را از داخل ربات بله باز کنید!');
            }
        }

        // دریافت اطلاعات از سرور ربات (اختیاری)
        async function loadData() {
            try {
                const response = await fetch('/api/get_data');
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    document.getElementById('results').innerHTML = data.results.map(r => 
                        `<div>⚽ ${r.team1} ${r.result} ${r.team2}</div>`
                    ).join('');
                } else {
                    document.getElementById('results').innerHTML = '<div>هنوز مسابقه‌ای برگزار نشده</div>';
                }
            } catch(e) {
                document.getElementById('results').innerHTML = '<div>در حال آماده‌سازی...</div>';
            }
        }
        
        loadData();
    </script>
</body>
</html>
