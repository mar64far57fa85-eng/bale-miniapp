<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>داور هوشمند فوتبال</title>
    <script src="https://tapi.bale.ai/miniapp.js?3"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3e 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* نوار بالا */
        .navbar {
            background: rgba(0,0,0,0.3);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(45deg, #feca57, #ff6b6b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        /* منوی اصلی */
        .main-menu {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        .menu-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .menu-card:active {
            transform: scale(0.97);
            background: rgba(255,255,255,0.2);
        }

        .menu-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .menu-title {
            font-size: 14px;
            font-weight: bold;
        }

        /* صفحات داخلی */
        .page {
            display: none;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .page.active {
            display: block;
        }

        /* فرم‌ها */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #feca57;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 14px;
        }

        button {
            background: linear-gradient(45deg, #feca57, #ff6b6b);
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
        }

        button.secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        /* جدول */
        .table {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
        }

        .table-row {
            display: grid;
            grid-template-columns: 40px 1fr 40px 40px 40px 40px 45px;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 12px;
        }

        .table-header {
            background: rgba(255,255,255,0.1);
            color: #feca57;
            font-weight: bold;
        }

        /* پیام‌ها */
        .message {
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
        }

        .message.success {
            background: rgba(76,217,100,0.2);
            border: 1px solid #4cd964;
            color: #4cd964;
        }

        .message.error {
            background: rgba(255,59,48,0.2);
            border: 1px solid #ff3b30;
            color: #ff6b6b;
        }

        /* کاربر */
        .user-info {
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            margin: 10px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* لودینگ */
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        /* محصول فروشگاه */
        .shop-item {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .shop-item-info h4 {
            margin-bottom: 5px;
        }

        .shop-item-info p {
            font-size: 12px;
            color: #aaa;
        }

        .shop-item-price {
            color: #feca57;
            font-weight: bold;
        }

        .btn-small {
            background: linear-gradient(45deg, #feca57, #ff6b6b);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            width: auto;
            margin-top: 0;
        }

        @media (min-width: 600px) {
            .main-menu {
                grid-template-columns: repeat(4, 1fr);
                max-width: 800px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">⚽ داور هوشمند</div>
        <button class="back-btn" id="backBtn" style="display: none;">🔙 بازگشت</button>
    </div>

    <div id="userInfo" class="user-info">
        <span>👤 در حال بارگیری...</span>
        <span id="teamName"></span>
    </div>

    <!-- منوی اصلی -->
    <div id="mainMenu" class="main-menu">
        <div class="menu-card" onclick="navigateTo('tactic')">
            <div class="menu-icon">📝</div>
            <div class="menu-title">ارسال تاکتیک</div>
        </div>
        <div class="menu-card" onclick="navigateTo('lineup')">
            <div class="menu-icon">👕</div>
            <div class="menu-title">ترکیب من</div>
        </div>
        <div class="menu-card" onclick="navigateTo('league')">
            <div class="menu-icon">🏆</div>
            <div class="menu-title">جدول لیگ</div>
        </div>
        <div class="menu-card" onclick="navigateTo('shop')">
            <div class="menu-icon">🛍️</div>
            <div class="menu-title">فروشگاه</div>
        </div>
        <div class="menu-card" onclick="navigateTo('friendly')">
            <div class="menu-icon">🎮</div>
            <div class="menu-title">درخواست بازی</div>
        </div>
        <div class="menu-card" onclick="navigateTo('feedback')">
            <div class="menu-icon">💬</div>
            <div class="menu-title">نظرات</div>
        </div>
    </div>

    <!-- صفحه ارسال تاکتیک -->
    <div id="tacticPage" class="page">
        <h2>📝 ارسال تاکتیک</h2>
        <div class="form-group">
            <label>سیستم بازی (مثال: 4-3-3)</label>
            <input type="text" id="tacticFormation" placeholder="4-3-3">
        </div>
        <div class="form-group">
            <label>ترکیب (هر بازیکن یک خط)</label>
            <textarea id="tacticPlayers" rows="5" placeholder="GK: نام (85)&#10;CB: نام (90)&#10;ST: نام (95)"></textarea>
        </div>
        <div class="form-group">
            <label>توضیحات تاکتیکی</label>
            <textarea id="tacticDesc" rows="3" placeholder="توضیحات تاکتیکی خود را وارد کنید..."></textarea>
        </div>
        <button onclick="sendTactic()">📤 ارسال تاکتیک</button>
        <button class="secondary" onclick="navigateTo('main')">🔙 بازگشت</button>
        <div id="tacticMessage"></div>
    </div>

    <!-- صفحه ترکیب من -->
    <div id="lineupPage" class="page">
        <h2>👕 ترکیب تیم من</h2>
        <div id="lineupList" class="loading">در حال بارگیری...</div>
        <button class="secondary" onclick="navigateTo('main')">🔙 بازگشت</button>
    </div>

    <!-- صفحه جدول لیگ -->
    <div id="leaguePage" class="page">
        <h2>🏆 جدول لیگ</h2>
        <div id="standingsList" class="loading">در حال بارگیری...</div>
        <button class="secondary" onclick="navigateTo('main')">🔙 بازگشت</button>
    </div>

    <!-- صفحه فروشگاه -->
    <div id="shopPage" class="page">
        <h2>🛍️ فروشگاه</h2>
        <div id="shopList" class="loading">در حال بارگیری...</div>
        <button class="secondary" onclick="navigateTo('main')">🔙 بازگشت</button>
    </div>

    <!-- صفحه درخواست بازی -->
    <div id="friendlyPage" class="page">
        <h2>🎮 درخواست بازی دوستانه</h2>
        <div class="form-group">
            <label>شناسه تیم حریف</label>
            <input type="text" id="friendlyOpponent" placeholder="شناسه تیم حریف را وارد کنید">
        </div>
        <button onclick="sendFriendlyRequest()">📤 ارسال درخواست</button>
        <button class="secondary" onclick="navigateTo('main')">🔙 بازگشت</button>
        <div id="friendlyMessage"></div>
    </div>

    <!-- صفحه نظرات -->
    <div id="feedbackPage" class="page">
        <h2>💬 نظرات و پیشنهادات</h2>
        <div class="form-group">
            <label>نظر شما</label>
            <textarea id="feedbackText" rows="4" placeholder="نظر یا پیشنهاد خود را بنویسید..."></textarea>
        </div>
        <button onclick="sendFeedback()">📤 ارسال نظر</button>
        <button class="secondary" onclick="navigateTo('main')">🔙 بازگشت</button>
        <div id="feedbackMessage"></div>
    </div>

    <script>
        let WebApp = window.Telegram?.WebApp || window.Bale?.WebApp;
        let userId = null;

        // اتصال به بله
        if (WebApp) {
            WebApp.ready();
            WebApp.expand();
            const user = WebApp.initDataUnsafe?.user;
            if (user) {
                userId = user.id;
                document.querySelector('#userInfo span:first-child').innerHTML = `👤 ${user.first_name || 'کاربر'}`;
            }
        }

        // آدرس API ربات
        const API_BASE = "http://localhost:5001/api";

        // navigation
        function navigateTo(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('backBtn').style.display = 'block';
            
            if (page === 'main') {
                document.getElementById('mainMenu').style.display = 'grid';
                document.getElementById('backBtn').style.display = 'none';
            } else {
                document.getElementById(`${page}Page`).classList.add('active');
                loadPageData(page);
            }
        }

        // بارگیری داده‌های هر صفحه
        async function loadPageData(page) {
            if (page === 'lineup') {
                await loadMyLineup();
            } else if (page === 'league') {
                await loadStandings();
            } else if (page === 'shop') {
                await loadShop();
            }
        }

        // نمایش پیام
        function showMessage(elementId, text, type = 'success') {
            const el = document.getElementById(elementId);
            if (el) {
                el.innerHTML = `<div class="message ${type}">${text}</div>`;
                setTimeout(() => { el.innerHTML = ''; }, 3000);
            }
        }

        // بارگیری ترکیب من
        async function loadMyLineup() {
            try {
                const res = await fetch(`${API_BASE}/my_team/${userId}`);
                const data = await res.json();
                if (data.team) {
                    document.getElementById('teamName').innerHTML = `⚽ ${data.team}`;
                }
                document.getElementById('lineupList').innerHTML = data.players && data.players.length > 0 
                    ? `<div class="table">${data.players.map(p => `<div class="table-row"><div>${p.position}</div><div>${p.name}</div><div>${p.rating}</div></div>`).join('')}</div>`
                    : `<div class="loading">${data.team ? 'هنوز ترکیبی ثبت نشده' : 'شما تیمی ندارید'}</div>`;
            } catch(e) {
                document.getElementById('lineupList').innerHTML = '<div class="loading">در حال اتصال به ربات...</div>';
            }
        }

        // بارگیری جدول لیگ
        async function loadStandings() {
            try {
                const res = await fetch(`${API_BASE}/standings`);
                const standings = await res.json();
                if (standings.length > 0) {
                    document.getElementById('standingsList').innerHTML = `
                        <div class="table">
                            <div class="table-row table-header">
                                <div>#</div><div>تیم</div><div>بازی</div><div>برد</div><div>مساوی</div><div>باخت</div><div>امتیاز</div>
                            </div>
                            ${standings.map((t, i) => `
                                <div class="table-row">
                                    <div>${i+1}</div>
                                    <div>${t.name}</div>
                                    <div>${t.played}</div>
                                    <div>${t.wins}</div>
                                    <div>${t.draws}</div>
                                    <div>${t.losses}</div>
                                    <div style="color:#feca57; font-weight:bold;">${t.points}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    document.getElementById('standingsList').innerHTML = '<div class="loading">لیگی شروع نشده</div>';
                }
            } catch(e) {
                document.getElementById('standingsList').innerHTML = '<div class="loading">در حال اتصال...</div>';
            }
        }

        // بارگیری فروشگاه
        async function loadShop() {
            try {
                const res = await fetch(`${API_BASE}/shop`);
                const items = await res.json();
                if (items.length > 0) {
                    document.getElementById('shopList').innerHTML = items.map(item => `
                        <div class="shop-item">
                            <div class="shop-item-info">
                                <h4>${item.title}</h4>
                                <p>${item.description}</p>
                            </div>
                            <div>
                                <div class="shop-item-price">${item.price} تومان</div>
                                <button class="btn-small" onclick="buyItem(${item.id})">خرید</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('shopList').innerHTML = '<div class="loading">فروشگاه خالی است</div>';
                }
            } catch(e) {
                document.getElementById('shopList').innerHTML = '<div class="loading">در حال اتصال...</div>';
            }
        }

        // ارسال تاکتیک
        async function sendTactic() {
            const formation = document.getElementById('tacticFormation').value;
            const players = document.getElementById('tacticPlayers').value;
            const desc = document.getElementById('tacticDesc').value;

            if (!formation || !players || !desc) {
                showMessage('tacticMessage', '❌ همه فیلدها را پر کنید!', 'error');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/send_tactic`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, formation, players, tactic: desc })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('tacticMessage', '✅ تاکتیک شما ارسال شد!', 'success');
                    document.getElementById('tacticFormation').value = '';
                    document.getElementById('tacticPlayers').value = '';
                    document.getElementById('tacticDesc').value = '';
                } else {
                    showMessage('tacticMessage', '❌ ' + (data.error || 'خطا در ارسال!'), 'error');
                }
            } catch(e) {
                showMessage('tacticMessage', '❌ خطا در اتصال به ربات!', 'error');
            }
        }

        // ارسال درخواست بازی
        async function sendFriendlyRequest() {
            const opponent = document.getElementById('friendlyOpponent').value;
            if (!opponent) {
                showMessage('friendlyMessage', '❌ شناسه تیم حریف را وارد کنید!', 'error');
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/friendly_request`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, opponent_id: opponent })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('friendlyMessage', '✅ درخواست بازی ارسال شد!', 'success');
                    document.getElementById('friendlyOpponent').value = '';
                } else {
                    showMessage('friendlyMessage', '❌ ' + (data.error || 'خطا در ارسال!'), 'error');
                }
            } catch(e) {
                showMessage('friendlyMessage', '❌ خطا در اتصال به ربات!', 'error');
            }
        }

        // ارسال نظر
        async function sendFeedback() {
            const text = document.getElementById('feedbackText').value;
            if (!text) {
                showMessage('feedbackMessage', '❌ متن نظر را وارد کنید!', 'error');
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/feedback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, message: text })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('feedbackMessage', '✅ نظر شما ثبت شد!', 'success');
                    document.getElementById('feedbackText').value = '';
                } else {
                    showMessage('feedbackMessage', '❌ خطا در ارسال!', 'error');
                }
            } catch(e) {
                showMessage('feedbackMessage', '❌ خطا در اتصال به ربات!', 'error');
            }
        }

        // خرید
        async function buyItem(itemId) {
            try {
                const res = await fetch(`${API_BASE}/buy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, item_id: itemId })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('shopList', '✅ درخواست خرید ثبت شد! در ربات پرداخت کنید.', 'success');
                } else {
                    showMessage('shopList', '❌ خطا در خرید!', 'error');
                }
            } catch(e) {
                showMessage('shopList', '❌ خطا در اتصال!', 'error');
            }
        }

        // دکمه بازگشت
        document.getElementById('backBtn').onclick = () => navigateTo('main');

        // بارگیری اولیه
        loadMyLineup();
    </script>
</body>
</html>
