<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داور هوشمند فوتبال</title>
    <script src="https://tapi.bale.ai/miniapp.js?3"></script>
    <style>
        body{background:linear-gradient(135deg,#0a0a2a,#1a1a3e);color:white;font-family:Tahoma;padding:20px;text-align:center}
        button{background:#feca57;color:#1a1a2e;border:none;padding:15px;margin:10px;border-radius:15px;font-size:16px;cursor:pointer;width:45%}
        h1{font-size:22px;margin-bottom:20px}
    </style>
</head>
<body>
    <h1>⚽ داور هوشمند فوتبال</h1>
    <button onclick="sendCmd('🎯 تاکتیک')">📝 تاکتیک</button>
    <button onclick="sendCmd('📋 ترکیب من')">👕 ترکیب من</button>
    <button onclick="sendCmd('🤝 درخواست بازی')">🎮 درخواست بازی</button>
    <button onclick="sendCmd('🛒 فروشگاه')">🛍️ فروشگاه</button>
    <button onclick="sendCmd('📊 لیگ و نتایج')">🏆 جدول لیگ</button>
    <button onclick="sendCmd('💬 نظرات')">💬 نظرات</button>
    <button onclick="sendCmd('/admin')">⚙️ مدیریت</button>
    <p style="margin-top:30px;font-size:12px">💡 روی دکمه کلیک کن → مینی‌اپ بسته میشه → ربات جواب میده</p>
    <script>
        let WebApp = window.Telegram?.WebApp || window.Bale?.WebApp;
        if(WebApp){WebApp.ready();WebApp.expand();}
        function sendCmd(cmd){if(WebApp){WebApp.sendData(cmd);WebApp.close();}else{alert('از داخل ربات بله باز کنید!');}}
    </script>
</body>
</html>
